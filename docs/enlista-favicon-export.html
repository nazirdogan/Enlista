<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 512px;
    height: 512px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 128px);
    grid-template-rows: repeat(3, 128px);
    gap: 32px;
  }
  .cell {
    width: 128px;
    height: 128px;
    border-radius: 24px;
    background: #2563EB;
  }
  .cell.off { background: #DBEAFE; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell off"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div>
  </div>
</body>
</html>
