<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Inter, sans-serif; background: #f0f2f5; color: #1a1a2e; }
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 50%, #16213e 100%);
  color: white; padding: 40px 24px 30px; text-align: center;
}
.header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
.header p { color: #94a3b8; font-size: 0.95rem; margin-bottom: 20px; }
.stats { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
.stat { background: rgba(255,255,255,0.08); border-radius: 10px; padding: 10px 20px; text-align: center; }
.stat-num { font-size: 1.5rem; font-weight: 700; color: #e94560; }
.stat-lbl { font-size: 0.75rem; color: #94a3b8; margin-top: 2px; }
.controls {
  background: white; padding: 16px 24px; display: flex; flex-wrap: wrap;
  gap: 12px; align-items: center; border-bottom: 1px solid #e2e8f0;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.controls input[type="text"] {
  flex: 1; min-width: 200px; padding: 10px 14px; border: 1.5px solid #e2e8f0;
  border-radius: 8px; font-size: 0.9rem; font-family: Inter, sans-serif;
  outline: none; transition: border-color 0.2s;
}
.controls input[type="text"]:focus { border-color: #e94560; }
.controls select {
  padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px;
  font-size: 0.85rem; font-family: Inter, sans-serif; background: white;
  cursor: pointer; max-width: 220px;
}
.btn-toggle {
  padding: 10px 16px; border-radius: 8px; border: 1.5px solid #e2e8f0;
  background: white; cursor: pointer; font-size: 0.82rem; font-family: Inter, sans-serif;
  font-weight: 500; transition: all 0.2s; white-space: nowrap;
}
.btn-toggle:hover { background: #f8f9fa; }
.btn-toggle.active { background: #e94560; color: white; border-color: #e94560; }
.result-count { color: #64748b; font-size: 0.85rem; margin-left: auto; white-space: nowrap; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px 16px; }
table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
thead { background: #1a1a2e; color: white; }
thead th { padding: 14px 16px; text-align: left; font-size: 0.82rem; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer; user-select: none; white-space: nowrap; }
thead th:hover { background: #0f3460; }
thead th .sort-arrow { margin-left: 4px; opacity: 0.5; }
thead th.sorted .sort-arrow { opacity: 1; color: #e94560; }
tbody tr { border-bottom: 1px solid #f1f5f9; transition: background 0.15s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #fafbff; }
td { padding: 12px 16px; font-size: 0.875rem; vertical-align: middle; }
.agent-name { font-weight: 600; color: #1a1a2e; }
.agency-name { color: #475569; font-size: 0.82rem; }
.link-phone { color: #0f3460; text-decoration: none; font-weight: 500; }
.link-phone:hover { color: #e94560; }
.link-wa { display: inline-flex; align-items: center; gap: 5px; background: #25d366; color: white; padding: 5px 10px; border-radius: 6px; text-decoration: none; font-size: 0.78rem; font-weight: 600; }
.link-wa:hover { background: #128c7e; }
.link-ig { display: inline-flex; align-items: center; gap: 5px; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: white; padding: 5px 10px; border-radius: 6px; text-decoration: none; font-size: 0.78rem; font-weight: 600; }
.link-ig:hover { opacity: 0.85; }
.badge-na { color: #94a3b8; font-size: 0.78rem; }
.num-col { font-variant-numeric: tabular-nums; color: #94a3b8; font-size: 0.8rem; text-align: right; width: 50px; }
/* ── Logo Mark (Option 6 — blue colorway) ── */
.logo-mark {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 18px;
  text-decoration: none;
}
.logo-grid-mark {
  display: grid;
  grid-template-columns: repeat(3, 11px);
  grid-template-rows: repeat(3, 11px);
  gap: 3px;
}
.lg-cell {
  width: 11px;
  height: 11px;
  border-radius: 2px;
  background: rgba(93,163,255,0.18);
}
.lg-cell.on { background: #5DA3FF; }
.logo-wordmark {
  font-family: Inter, sans-serif;
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.04em;
  color: #fff;
  line-height: 1;
}
.logo-wordmark .accent { color: #5DA3FF; }
@media (max-width: 768px) {
  .header h1 { font-size: 1.5rem; }
  .controls { padding: 12px; }
  td, th { padding: 10px 12px; }
  .agency-name { display: none; }
  .logo-wordmark { font-size: 22px; }
  .logo-grid-mark { grid-template-columns: repeat(3, 9px); grid-template-rows: repeat(3, 9px); gap: 2px; }
  .lg-cell { width: 9px; height: 9px; }
}
</style>
</head>

let filterIG=false, filterWA=false, sortKey='name', sortAsc=true;
function toggleWA() { filterWA=!filterWA; document.getElementById('btnWA').classList.toggle('active',filterWA); render(); }
function toggleIG() { filterIG=!filterIG; document.getElementById('btnIG').classList.toggle('active',filterIG); render(); }
function setSort(k) {
  if(sortKey===k) sortAsc=!sortAsc; else { sortKey=k; sortAsc=true; }
  document.querySelectorAll('thead th').forEach(th=>th.classList.remove('sorted'));
  render();
}
function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const ag = document.getElementById('agencyFilter').value;
  let d = AGENTS.filter(a => {
    if(filterWA && !a[3]) return false;
    if(filterIG && !a[4]) return false;
    if(ag && a[1] !== ag) return false;
    if(q) {
      const hay = (a[0]+' '+a[1]+' '+a[4]).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  d.sort((a,b) => {
    let va = a[sortKey==='agency'?1:0].toLowerCase();
    let vb = b[sortKey==='agency'?1:0].toLowerCase();
    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });
  document.getElementById('resultCount').textContent = d.length.toLocaleString() + ' agents';
  const tb = document.getElementById('tableBody');
  tb.innerHTML = d.map((a,i) => {
    const waLink = a[3] ? '<a class="link-wa" href="https://wa.me/' + a[3].replace(/[^0-9]/g,'') + '" target="_blank">&#128172; WhatsApp</a>' : '<span class="badge-na">—</span>';
    const igLink = a[4] ? '<a class="link-ig" href="https://instagram.com/' + a[4].replace('@','') + '" target="_blank">&#128247; ' + a[4] + '</a>' : '<span class="badge-na">—</span>';
    const phone = a[2] ? '<a class="link-phone" href="tel:' + a[2] + '">' + a[2] + '</a>' : '—';
    return '<tr><td class="num-col">'+(i+1)+'</td><td><div class="agent-name">'+a[0]+'</div><div class="agency-name">'+a[1]+'</div></td><td>'+a[1]+'</td><td>'+phone+'</td><td>'+waLink+'</td><td>'+igLink+'</td></tr>';
  }).join('');
}
