<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubai Real Estate Brokerages - Decision Maker Directory</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #e0e0e0; }

.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  padding: 32px 40px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.header h1 { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 6px; }
.header p { color: #8892b0; font-size: 14px; }

.stats-bar {
  display: flex; gap: 24px; padding: 20px 40px;
  background: #0f0f1a; border-bottom: 1px solid rgba(255,255,255,0.06);
}
.stat { text-align: center; }
.stat-num { font-size: 28px; font-weight: 800; color: #64ffda; }
.stat-label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

.controls {
  padding: 20px 40px;
  display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
  background: #0d0d18; border-bottom: 1px solid rgba(255,255,255,0.06);
}
.search-box {
  flex: 1; min-width: 280px; padding: 10px 16px;
  background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 8px;
  color: #fff; font-size: 14px; outline: none;
}
.search-box:focus { border-color: #64ffda; }
.search-box::placeholder { color: #4a4a6a; }

.filter-btn {
  padding: 8px 16px; border-radius: 6px; border: 1px solid #2a2a4a;
  background: #1a1a2e; color: #8892b0; cursor: pointer; font-size: 13px;
  transition: all 0.2s;
}
.filter-btn:hover, .filter-btn.active { background: #64ffda; color: #0a0a0f; border-color: #64ffda; font-weight: 600; }

.size-filters { display: flex; gap: 8px; align-items: center; }
.size-label { color: #6b7280; font-size: 12px; margin-right: 4px; }

.export-btn {
  padding: 8px 16px; border-radius: 6px; border: 1px solid #e8b059;
  background: transparent; color: #e8b059; cursor: pointer; font-size: 13px;
  transition: all 0.2s; margin-left: auto;
}
.export-btn:hover { background: #e8b059; color: #0a0a0f; }

.results-info {
  padding: 10px 40px; font-size: 12px; color: #6b7280; background: #0a0a0f;
}

.table-wrap { padding: 0 40px 40px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead { position: sticky; top: 0; z-index: 10; }
th {
  background: #1a1a2e; padding: 12px 10px; text-align: left; color: #64ffda;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
  border-bottom: 2px solid #2a2a4a; cursor: pointer; user-select: none;
  white-space: nowrap;
}
th:hover { color: #fff; }
th .sort-arrow { margin-left: 4px; font-size: 10px; }

td {
  padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.04);
  vertical-align: top;
}
tr:hover td { background: rgba(100,255,218,0.03); }

.agency-name { font-weight: 600; color: #fff; font-size: 14px; }
.agent-count {
  display: inline-block; padding: 2px 8px; border-radius: 12px;
  font-size: 12px; font-weight: 700; text-align: center;
}
.count-lg { background: rgba(100,255,218,0.15); color: #64ffda; }
.count-md { background: rgba(232,176,89,0.15); color: #e8b059; }
.count-sm { background: rgba(139,92,246,0.15); color: #8b5cf6; }
.count-xs { background: rgba(107,114,128,0.15); color: #6b7280; }

.person { margin-bottom: 4px; }
.person-name { font-weight: 600; color: #c9d1d9; }
.person-title { font-size: 11px; color: #6b7280; }

.contact-link {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 4px; font-size: 11px;
  text-decoration: none; margin: 2px 2px 2px 0; white-space: nowrap;
}
.wa-link { background: rgba(37,211,102,0.12); color: #25d366; }
.wa-link:hover { background: rgba(37,211,102,0.25); }
.email-link { background: rgba(59,130,246,0.12); color: #3b82f6; }
.email-link:hover { background: rgba(59,130,246,0.25); }
.phone-link { background: rgba(232,176,89,0.12); color: #e8b059; }
.phone-link:hover { background: rgba(232,176,89,0.25); }

.badge {
  display: inline-block; padding: 2px 6px; border-radius: 4px;
  font-size: 10px; font-weight: 600; text-transform: uppercase;
}
.badge-researched { background: rgba(100,255,218,0.12); color: #64ffda; }
.badge-pending { background: rgba(107,114,128,0.12); color: #6b7280; }

.expand-btn {
  background: none; border: 1px solid #2a2a4a; color: #8892b0;
  padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 11px;
}
.expand-btn:hover { border-color: #64ffda; color: #64ffda; }

.detail-row { display: none; }
.detail-row.open { display: table-row; }
.detail-cell {
  padding: 12px 20px; background: #12121e;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.detail-section h4 { color: #64ffda; font-size: 12px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.detail-section p { margin-bottom: 4px; }

.no-data { color: #4a4a6a; font-style: italic; font-size: 12px; }

@media (max-width: 900px) {
  .controls, .stats-bar { padding: 16px 20px; }
  .table-wrap { padding: 0 10px 20px; }
  td, th { padding: 6px; font-size: 12px; }
  .detail-grid { grid-template-columns: 1fr; }
}
</style>
</head>

</table>

": "", "ceo_phone": "", "sales_head_name": "", "sales_head_title": "", "sales_head_email": "", "sales_head_phone": "", "researched": false}, {"agency": "ELITE OSE REAL ESTATE L.L.C", "agents_count": 1, "sample_agents": ["Fahad Muhammad Hanif"], "ceo_name": "", "ceo_title": "", "ceo_email": "", "ceo_phone": "", "sales_head_name": "", "sales_head_title": "", "sales_head_email": "", "sales_head_phone": "", "researched": false}];

let filtered = [...DATA];
let sortCol = 'agents_count';
let sortDir = -1;
let searchTerm = '';
let sizeFilter = 'all';
let statusFilter = 'all';
let openRows = new Set();

function getCountClass(n) {
  if (n >= 50) return 'count-lg';
  if (n >= 20) return 'count-md';
  if (n >= 5) return 'count-sm';
  return 'count-xs';
}

function makeContactLinks(email, phone) {
  let links = [];
  if (phone) {
    const clean = phone.replace(/[^+0-9]/g, '');
    links.push(`<a class="contact-link wa-link" href="https://wa.me/${clean.replace('+','')}" target="_blank">WhatsApp</a>`);
    links.push(`<a class="contact-link phone-link" href="tel:${clean}">${phone}</a>`);
  }
  if (email) {
    links.push(`<a class="contact-link email-link" href="mailto:${email}">${email}</a>`);
  }
  return links.length ? links.join('') : '<span class="no-data">—</span>';
}

function render() {
  let items = DATA.filter(d => {
    if (sizeFilter === 'large' && d.agents_count < 50) return false;
    if (sizeFilter === 'medium' && (d.agents_count < 20 || d.agents_count >= 50)) return false;
    if (sizeFilter === 'small' && (d.agents_count < 5 || d.agents_count >= 20)) return false;
    if (sizeFilter === 'micro' && d.agents_count >= 5) return false;
    if (statusFilter === 'researched' && !d.researched) return false;
    if (statusFilter === 'pending' && d.researched) return false;
    if (searchTerm) {
      const s = searchTerm.toLowerCase();
      const haystack = [d.agency, d.ceo_name, d.ceo_title, d.ceo_email, d.sales_head_name, d.sales_head_title, d.sales_head_email].join(' ').toLowerCase();
      if (!haystack.includes(s)) return false;
    }
    return true;
  });

  items.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return -1 * sortDir;
    if (va > vb) return 1 * sortDir;
    return 0;
  });

  filtered = items;

  document.getElementById('showingCount').textContent = items.length.toLocaleString();
  document.getElementById('resultsInfo').textContent = `Showing ${items.length.toLocaleString()} of ${DATA.length.toLocaleString()} agencies`;

  const tbody = document.getElementById('tbody');
  let html = '';
  items.forEach((d, i) => {
    const isOpen = openRows.has(i);
    html += `<tr>
      <td><div class="agency-name">${d.agency}</div></td>
      <td style="text-align:center"><span class="agent-count ${getCountClass(d.agents_count)}">${d.agents_count}</span></td>
      <td>${d.ceo_name ? `<div class="person"><span class="person-name">${d.ceo_name}</span><div class="person-title">${d.ceo_title}</div></div>` : '<span class="no-data">—</span>'}</td>
      <td>${makeContactLinks(d.ceo_email, d.ceo_phone)}</td>
      <td>${d.sales_head_name ? `<div class="person"><span class="person-name">${d.sales_head_name}</span><div class="person-title">${d.sales_head_title}</div></div>` : '<span class="no-data">—</span>'}</td>
      <td>${makeContactLinks(d.sales_head_email, d.sales_head_phone)}</td>
      <td style="text-align:center"><span class="badge ${d.researched ? 'badge-researched' : 'badge-pending'}">${d.researched ? 'Done' : 'Pending'}</span></td>
      <td><button class="expand-btn" onclick="toggleRow(${i})">${isOpen ? '−' : '+'}</button></td>
    </tr>`;
    html += `<tr class="detail-row ${isOpen ? 'open' : ''}" id="detail-${i}">
      <td class="detail-cell" colspan="8">
        <div class="detail-grid">
          <div class="detail-section">
            <h4>CEO / Owner</h4>
            <p><strong>Name:</strong> ${d.ceo_name || '—'}</p>
            <p><strong>Title:</strong> ${d.ceo_title || '—'}</p>
            <p><strong>Email:</strong> ${d.ceo_email || '—'}</p>
            <p><strong>Phone:</strong> ${d.ceo_phone || '—'}</p>
          </div>
          <div class="detail-section">
            <h4>Head of Sales</h4>
            <p><strong>Name:</strong> ${d.sales_head_name || '—'}</p>
            <p><strong>Title:</strong> ${d.sales_head_title || '—'}</p>
            <p><strong>Email:</strong> ${d.sales_head_email || '—'}</p>
            <p><strong>Phone:</strong> ${d.sales_head_phone || '—'}</p>
          </div>
          <div class="detail-section">
            <h4>Sample Agents (${d.agents_count} total)</h4>
            <p>${d.sample_agents ? d.sample_agents.join(', ') : '—'}</p>
          </div>
        </div>
      </td>
    </tr>`;
  });
  tbody.innerHTML = html;
}

function toggleRow(i) {
  if (openRows.has(i)) openRows.delete(i); else openRows.add(i);
  render();
}

function sortBy(col) {
  document.querySelectorAll('.sort-arrow').forEach(el => el.textContent = '');
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = col === 'agents_count' ? -1 : 1; }
  document.getElementById('sort-' + col).textContent = sortDir === 1 ? '▲' : '▼';
  render();
}

document.getElementById('search').addEventListener('input', e => { searchTerm = e.target.value; render(); });

document.querySelectorAll('[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sizeFilter = btn.dataset.filter;
    render();
  });
});

document.querySelectorAll('[data-status]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-status]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    statusFilter = btn.dataset.status;
    render();
  });
});

function exportCSV() {
  let csv = 'Agency,Agents,CEO Name,CEO Title,CEO Email,CEO Phone,Sales Head Name,Sales Head Title,Sales Head Email,Sales Head Phone,Status\n';
  filtered.forEach(d => {
    csv += [d.agency, d.agents_count, d.ceo_name, d.ceo_title, d.ceo_email, d.ceo_phone, d.sales_head_name, d.sales_head_title, d.sales_head_email, d.sales_head_phone, d.researched?'Researched':'Pending'].map(v => `"${String(v||'').replace(/"/g,'""')}"` ).join(',') + '\n';
  });
  const blob = new Blob([csv], {type: 'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'dubai_brokerages_decision_makers.csv'; a.click();
  URL.revokeObjectURL(url);
}

render();
</script>
