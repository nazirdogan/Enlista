<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Logo 1: Geometric Building Icon + Wordmark -->
  <!-- A stylized building/skyscraper forming a location pin shape -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Pin/Building icon -->
  <g transform="translate(20, 10)">
    <!-- Outer pin shape -->
    <path d="M45 5 C20 5, 5 22, 5 42 C5 65, 45 95, 45 95 C45 95, 85 65, 85 42 C85 22, 70 5, 45 5Z" fill="url(#grad1)"/>
    <!-- Building windows -->
    <rect x="30" y="22" width="8" height="8" rx="1" fill="white" opacity="0.9"/>
    <rect x="42" y="22" width="8" height="8" rx="1" fill="white" opacity="0.9"/>
    <rect x="54" y="22" width="8" height="8" rx="1" fill="white" opacity="0.6"/>
    <rect x="30" y="34" width="8" height="8" rx="1" fill="white" opacity="0.9"/>
    <rect x="42" y="34" width="8" height="8" rx="1" fill="white" opacity="0.9"/>
    <rect x="54" y="34" width="8" height="8" rx="1" fill="white" opacity="0.6"/>
    <rect x="30" y="46" width="8" height="8" rx="1" fill="white" opacity="0.7"/>
    <rect x="42" y="46" width="8" height="8" rx="1" fill="white" opacity="0.7"/>
    <rect x="54" y="46" width="8" height="8" rx="1" fill="white" opacity="0.5"/>
    <!-- Building door -->
    <rect x="39" y="58" width="12" height="14" rx="2" fill="white" opacity="0.95"/>
  </g>

  <!-- Wordmark -->
  <text x="120" y="72" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="48" font-weight="700" fill="#0F1829" letter-spacing="-1">enlista</text>

  <!-- Tagline -->
  <text x="122" y="95" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="13" font-weight="500" fill="#64748B" letter-spacing="3">AI-POWERED LISTINGS</text>
</svg>