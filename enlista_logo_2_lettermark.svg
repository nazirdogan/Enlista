<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Logo 2: 'E' Lettermark with listing lines -->
  <!-- The letter E is formed by horizontal listing lines, representing property listings -->
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D4ED8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="10" y="10" width="90" height="90" rx="20" fill="url(#grad2)"/>

  <!-- 'E' formed by listing-style lines -->
  <!-- Vertical bar of E -->
  <rect x="30" y="28" width="6" height="54" rx="3" fill="white"/>

  <!-- Top horizontal bar with bullet -->
  <circle cx="44" cy="32" r="3" fill="white" opacity="0.7"/>
  <rect x="50" y="29" width="34" height="6" rx="3" fill="white"/>

  <!-- Middle horizontal bar with bullet -->
  <circle cx="44" cy="55" r="3" fill="white" opacity="0.7"/>
  <rect x="50" y="52" width="28" height="6" rx="3" fill="white"/>

  <!-- Bottom horizontal bar with bullet -->
  <circle cx="44" cy="78" r="3" fill="white" opacity="0.7"/>
  <rect x="50" y="75" width="34" height="6" rx="3" fill="white"/>

  <!-- Wordmark -->
  <text x="115" y="72" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="48" font-weight="800" fill="#0F1829" letter-spacing="-1">enlista</text>

  <!-- Accent dot on the 'i' -->
  <circle cx="247" cy="43" r="5" fill="#1D4ED8"/>
</svg>