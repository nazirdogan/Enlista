<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Logo 4: Stacked Portal Sync Bars — represents multi-portal syndication -->
  <!-- Three overlapping horizontal bars fanning out like synced listing feeds -->
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <g transform="translate(18, 18)">
    <!-- Three stacked bars representing portal feeds -->
    <!-- Bar 1 — top, slightly rotated -->
    <rect x="5" y="12" width="70" height="14" rx="7" fill="#1D4ED8" transform="rotate(-8, 40, 19)"/>
    <!-- Bar 2 — middle, straight -->
    <rect x="5" y="35" width="75" height="14" rx="7" fill="#3B82F6"/>
    <!-- Bar 3 — bottom, slightly rotated opposite -->
    <rect x="5" y="58" width="70" height="14" rx="7" fill="#1D4ED8" opacity="0.7" transform="rotate(8, 40, 65)"/>

    <!-- Small sync arrows -->
    <g transform="translate(62, 28)" fill="#0F1829" opacity="0.3">
      <polygon points="0,8 6,4 6,12"/>
      <polygon points="12,0 6,4 6,-4" transform="translate(0, 8)"/>
    </g>
  </g>

  <!-- Wordmark — slightly different style: lighter weight with bold first letter -->
  <text x="115" y="58" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="44" font-weight="300" fill="#0F1829" letter-spacing="1">
    <tspan font-weight="800">e</tspan>nlista
  </text>

  <!-- Underline accent -->
  <rect x="115" y="67" width="60" height="3" rx="1.5" fill="#1D4ED8"/>

  <!-- Tagline -->
  <text x="115" y="88" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="500" fill="#64748B" letter-spacing="2.5">LIST · SYNC · CONVERT</text>
</svg>