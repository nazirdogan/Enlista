<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Logo 5: Circular Badge Emblem — professional, stamp-like -->
  <!-- A circle with a stylized 'E' cursor inside, plus wordmark -->
  <defs>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D4ED8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <g transform="translate(12, 10)">
    <!-- Outer circle -->
    <circle cx="50" cy="50" r="48" fill="none" stroke="#1D4ED8" stroke-width="3"/>
    <!-- Inner filled circle -->
    <circle cx="50" cy="50" r="40" fill="url(#grad5)"/>

    <!-- Stylized 'E' inside — modern, geometric -->
    <path d="M34 30 L34 70 L66 70" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="34" y1="50" x2="60" y2="50" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="34" y1="30" x2="66" y2="30" stroke="white" stroke-width="5" stroke-linecap="round"/>

    <!-- AI cursor blink -->
    <rect x="68" y="25" width="3" height="14" rx="1.5" fill="white" opacity="0.8"/>
  </g>

  <!-- Wordmark -->
  <text x="125" y="55" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="42" font-weight="800" fill="#0F1829" letter-spacing="2">ENLISTA</text>

  <!-- Divider line -->
  <line x1="125" y1="65" x2="370" y2="65" stroke="#DDE3EC" stroke-width="1"/>

  <!-- Tagline -->
  <text x="125" y="82" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#1D4ED8" letter-spacing="3">REAL ESTATE AI PLATFORM</text>
</svg>