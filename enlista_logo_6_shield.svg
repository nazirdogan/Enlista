<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140" width="480" height="140">
  <!-- Logo 6: Premium Shield Monogram -->
  <!-- A refined shield shape with an elegant 'E' monogram — conveys trust and authority -->
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1D4ED8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3fa0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.15" />
      <stop offset="50%" style="stop-color:white;stop-opacity:0" />
      <stop offset="100%" style="stop-color:white;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <g transform="translate(16, 8)">
    <!-- Shield shape -->
    <path d="M50 4 L10 20 L10 60 C10 88, 30 110, 50 120 C70 110, 90 88, 90 60 L90 20 Z" fill="url(#shieldGrad)"/>
    <!-- Shine overlay -->
    <path d="M50 4 L10 20 L10 60 C10 88, 30 110, 50 120 C70 110, 90 88, 90 60 L90 20 Z" fill="url(#shieldShine)"/>
    <!-- Thin inner border -->
    <path d="M50 12 L18 26 L18 60 C18 84, 34 104, 50 112 C66 104, 82 84, 82 60 L82 26 Z" fill="none" stroke="white" stroke-width="0.6" opacity="0.3"/>

    <!-- Elegant E monogram — thin strokes -->
    <g stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.95">
      <line x1="36" y1="38" x2="36" y2="86"/>
      <line x1="36" y1="38" x2="64" y2="38"/>
      <line x1="36" y1="62" x2="58" y2="62"/>
      <line x1="36" y1="86" x2="64" y2="86"/>
    </g>

    <!-- Subtle sparkle dot -->
    <circle cx="67" cy="35" r="2" fill="white" opacity="0.6"/>
  </g>

  <!-- Wordmark — elegant, wide tracking -->
  <text x="130" y="72" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="50" font-weight="300" fill="#0F1829" letter-spacing="6">enlista</text>

  <!-- Fine separator line -->
  <line x1="130" y1="84" x2="180" y2="84" stroke="#1D4ED8" stroke-width="2" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="130" y="104" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#64748B" letter-spacing="4">INTELLIGENT REAL ESTATE</text>
</svg>