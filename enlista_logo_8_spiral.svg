<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140" width="480" height="140">
  <!-- Logo 8: Geometric Spiral / Fibonacci E -->
  <!-- An 'E' constructed from clean geometric arcs — mathematical precision meets elegance -->
  <defs>
    <linearGradient id="spiralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D4ED8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <g transform="translate(20, 14)">
    <!-- Outer circle (background) -->
    <circle cx="56" cy="56" r="54" fill="#0F1829"/>

    <!-- Geometric E from arcs and lines — golden ratio inspired -->
    <!-- Top arc -->
    <path d="M32 28 L60 28 A20 20 0 0 1 60 56" fill="none" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
    <!-- Bottom arc -->
    <path d="M32 84 L60 84 A20 20 0 0 0 60 56" fill="none" stroke="#1D4ED8" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <!-- Vertical spine -->
    <line x1="32" y1="24" x2="32" y2="88" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <!-- Middle arm — shorter, creates asymmetry -->
    <line x1="32" y1="56" x2="54" y2="56" stroke="white" stroke-width="4" stroke-linecap="round"/>

    <!-- Accent dots at arc endpoints -->
    <circle cx="60" cy="28" r="3" fill="#3B82F6"/>
    <circle cx="60" cy="84" r="3" fill="#1D4ED8" opacity="0.7"/>

    <!-- Subtle inner ring -->
    <circle cx="56" cy="56" r="46" fill="none" stroke="white" stroke-width="0.4" opacity="0.15"/>
  </g>

  <!-- Wordmark — sophisticated thin weight -->
  <text x="148" y="68" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="52" font-weight="200" fill="#0F1829" letter-spacing="4">enlista</text>

  <!-- Precision line -->
  <line x1="148" y1="80" x2="440" y2="80" stroke="#DDE3EC" stroke-width="0.8"/>

  <!-- Tagline aligned right -->
  <text x="440" y="100" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="#1D4ED8" letter-spacing="3" text-anchor="end">PRECISION LISTING PLATFORM</text>
</svg>