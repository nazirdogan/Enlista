<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140" width="480" height="140">
  <!-- Logo 9: Diamond Facet Mark -->
  <!-- A diamond/gem shape with internal facets forming an abstract 'E' — premium, luxury real estate -->
  <defs>
    <linearGradient id="diaGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="diaGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="diaGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <g transform="translate(16, 8)">
    <!-- Diamond shape — composed of facets -->
    <!-- Top-left facet -->
    <polygon points="55,4 10,52 55,52" fill="url(#diaGrad1)"/>
    <!-- Top-right facet -->
    <polygon points="55,4 100,52 55,52" fill="#3B82F6"/>
    <!-- Bottom-left facet -->
    <polygon points="10,52 55,52 55,120" fill="url(#diaGrad3)"/>
    <!-- Bottom-right facet -->
    <polygon points="100,52 55,52 55,120" fill="#1D4ED8"/>

    <!-- Inner facet lines for depth -->
    <line x1="55" y1="4" x2="55" y2="120" stroke="white" stroke-width="0.6" opacity="0.3"/>
    <line x1="10" y1="52" x2="100" y2="52" stroke="white" stroke-width="0.6" opacity="0.3"/>

    <!-- Diagonal sparkle lines -->
    <line x1="30" y1="28" x2="55" y2="52" stroke="white" stroke-width="0.4" opacity="0.2"/>
    <line x1="80" y1="28" x2="55" y2="52" stroke="white" stroke-width="0.4" opacity="0.2"/>

    <!-- E letterform cut into diamond — negative space -->
    <g fill="white" opacity="0.92">
      <rect x="40" y="30" width="3.5" height="62" rx="1"/>
      <rect x="40" y="30" width="26" height="3.5" rx="1"/>
      <rect x="40" y="58.5" width="20" height="3.5" rx="1"/>
      <rect x="40" y="88.5" width="26" height="3.5" rx="1"/>
    </g>

    <!-- Top sparkle -->
    <g transform="translate(88, 8)">
      <path d="M4 0 L5 3 L8 4 L5 5 L4 8 L3 5 L0 4 L3 3Z" fill="#3B82F6" opacity="0.5"/>
    </g>
  </g>

  <!-- Wordmark — ultra-premium serif-like feel using weight contrast -->
  <text x="138" y="66" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="48" font-weight="800" fill="#0F1829" letter-spacing="3">ENLISTA</text>

  <!-- Thin decorative lines flanking tagline -->
  <line x1="138" y1="84" x2="178" y2="84" stroke="#1D4ED8" stroke-width="1" stroke-linecap="round"/>
  <line x1="350" y1="84" x2="430" y2="84" stroke="#1D4ED8" stroke-width="1" stroke-linecap="round"/>
  <text x="244" y="88" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="#1D4ED8" letter-spacing="3" text-anchor="middle">LUXURY LISTINGS</text>
</svg>