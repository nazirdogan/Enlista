<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Logo V2-1: AI Cursor/Pen — A sleek cursor morphing into a list checkmark -->
  <defs>
    <linearGradient id="cursorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <g transform="translate(15, 10)">
    <!-- Stylized cursor/pen that forms a checkmark -->
    <path d="M10 85 L38 15 C39 12, 42 12, 43 15 L52 40 L78 20"
          fill="none" stroke="url(#cursorGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Three horizontal list lines -->
    <line x1="48" y1="50" x2="80" y2="50" stroke="#2563EB" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
    <line x1="48" y1="64" x2="75" y2="64" stroke="#2563EB" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="48" y1="78" x2="70" y2="78" stroke="#2563EB" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
  </g>

  <!-- Wordmark -->
  <text x="115" y="70" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="46" font-weight="700" fill="#0F172A" letter-spacing="-1.5">enlist<tspan fill="#2563EB">a</tspan></text>

  <!-- Tagline -->
  <text x="117" y="93" font-family="'Inter', system-ui, sans-serif" font-size="11.5" font-weight="500" fill="#94A3B8" letter-spacing="3.5">AI-POWERED LISTINGS</text>
</svg>