<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Logo V2-2: Stacked Layers — Overlapping cards representing multiple listings -->
  <defs>
    <linearGradient id="stackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <g transform="translate(18, 12)">
    <!-- Back card -->
    <rect x="18" y="4" width="56" height="72" rx="8" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
    <!-- Middle card -->
    <rect x="10" y="12" width="56" height="72" rx="8" fill="#93C5FD"/>
    <!-- Front card with "E" -->
    <rect x="2" y="20" width="56" height="72" rx="8" fill="url(#stackGrad)"/>
    <!-- Letter E on front card -->
    <text x="30" y="68" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="36" font-weight="800" fill="white" text-anchor="middle">E</text>
    <!-- Sparkle/AI dot -->
    <circle cx="68" cy="14" r="4" fill="#2563EB" opacity="0.7"/>
    <circle cx="76" cy="8" r="2.5" fill="#3B82F6" opacity="0.5"/>
  </g>

  <!-- Wordmark -->
  <text x="115" y="70" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="46" font-weight="700" fill="#0F172A" letter-spacing="-1.5">enlist<tspan fill="#2563EB">a</tspan></text>

  <!-- Tagline -->
  <text x="117" y="93" font-family="'Inter', system-ui, sans-serif" font-size="11.5" font-weight="500" fill="#94A3B8" letter-spacing="3.5">AI-POWERED LISTINGS</text>
</svg>