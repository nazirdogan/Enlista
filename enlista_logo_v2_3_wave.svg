<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Logo V2-3: Signal Wave — A flowing wave/signal emanating from a house shape, representing AI broadcast -->
  <defs>
    <linearGradient id="waveGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#1D4ED8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:0.6" />
    </linearGradient>
  </defs>

  <g transform="translate(12, 14)">
    <!-- House/home base shape -->
    <path d="M40 45 L40 80 C40 83, 42 85, 45 85 L70 85 C73 85, 75 83, 75 80 L75 45" fill="#2563EB"/>
    <!-- Roof -->
    <path d="M32 48 L57.5 22 L83 48" fill="none" stroke="#2563EB" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Door -->
    <rect x="52" y="62" width="12" height="23" rx="2" fill="white" opacity="0.9"/>
    <!-- Window -->
    <rect x="44" y="52" width="8" height="8" rx="1.5" fill="white" opacity="0.7"/>

    <!-- Signal waves -->
    <path d="M78 35 C85 30, 85 50, 78 45" fill="none" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
    <path d="M83 28 C94 20, 94 58, 83 50" fill="none" stroke="#60A5FA" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
    <path d="M88 21 C103 10, 103 66, 88 55" fill="none" stroke="#93C5FD" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Wordmark -->
  <text x="120" y="70" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="46" font-weight="700" fill="#0F172A" letter-spacing="-1.5">enlist<tspan fill="#2563EB">a</tspan></text>

  <!-- Tagline -->
  <text x="122" y="93" font-family="'Inter', system-ui, sans-serif" font-size="11.5" font-weight="500" fill="#94A3B8" letter-spacing="3.5">AI-POWERED LISTINGS</text>
</svg>