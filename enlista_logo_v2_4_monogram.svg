<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Logo V2-4: Bold Monogram — A modern geometric "E" inside a rounded square, app-icon style -->
  <defs>
    <linearGradient id="monoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1D4ED8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <g transform="translate(12, 10)">
    <!-- Rounded square background -->
    <rect x="4" y="4" width="90" height="90" rx="22" fill="url(#monoGrad)"/>

    <!-- Geometric E made of horizontal bars with varying widths -->
    <rect x="24" y="22" width="48" height="9" rx="3" fill="white"/>
    <rect x="24" y="40" width="38" height="9" rx="3" fill="white" opacity="0.85"/>
    <rect x="24" y="58" width="28" height="9" rx="3" fill="white" opacity="0.7"/>
    <rect x="24" y="76" width="48" height="9" rx="3" fill="white"/>

    <!-- Vertical bar of E -->
    <rect x="22" y="22" width="9" height="63" rx="3" fill="white"/>

    <!-- AI sparkle accent -->
    <circle cx="82" cy="14" r="5" fill="#60A5FA" opacity="0.6"/>
    <circle cx="92" cy="6" r="3" fill="#93C5FD" opacity="0.4"/>
  </g>

  <!-- Wordmark -->
  <text x="118" y="70" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="46" font-weight="700" fill="#0F172A" letter-spacing="-1.5">enlist<tspan fill="#2563EB">a</tspan></text>

  <!-- Tagline -->
  <text x="120" y="93" font-family="'Inter', system-ui, sans-serif" font-size="11.5" font-weight="500" fill="#94A3B8" letter-spacing="3.5">AI-POWERED LISTINGS</text>
</svg>