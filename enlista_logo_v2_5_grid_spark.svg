<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Logo V2-5: Grid Spark — Evolved 3x3 grid icon with one cell transforming into an AI sparkle -->
  <defs>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <g transform="translate(15, 13)">
    <!-- 3x3 Grid — 8 solid cells -->
    <!-- Row 1 -->
    <rect x="0" y="0" width="24" height="24" rx="5" fill="url(#sparkGrad)"/>
    <rect x="30" y="0" width="24" height="24" rx="5" fill="url(#sparkGrad)"/>
    <rect x="60" y="0" width="24" height="24" rx="5" fill="url(#sparkGrad)"/>

    <!-- Row 2 -->
    <rect x="0" y="30" width="24" height="24" rx="5" fill="url(#sparkGrad)"/>
    <rect x="30" y="30" width="24" height="24" rx="5" fill="url(#sparkGrad)"/>
    <!-- Top-right cell replaced by AI sparkle -->

    <!-- Row 3 -->
    <rect x="0" y="60" width="24" height="24" rx="5" fill="url(#sparkGrad)"/>
    <rect x="30" y="60" width="24" height="24" rx="5" fill="url(#sparkGrad)"/>
    <rect x="60" y="60" width="24" height="24" rx="5" fill="url(#sparkGrad)"/>

    <!-- AI Sparkle replacing middle-right cell -->
    <g transform="translate(72, 42)">
      <!-- 4-point star sparkle -->
      <path d="M0 -14 C2 -4, 4 -2, 14 0 C4 2, 2 4, 0 14 C-2 4, -4 2, -14 0 C-4 -2, -2 -4, 0 -14Z" fill="#60A5FA"/>
      <!-- Small accent sparkle -->
      <circle cx="10" cy="-10" r="2.5" fill="#93C5FD" opacity="0.7"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="115" y="70" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="46" font-weight="700" fill="#0F172A" letter-spacing="-1.5">enlist<tspan fill="#2563EB">a</tspan></text>

  <!-- Tagline -->
  <text x="117" y="93" font-family="'Inter', system-ui, sans-serif" font-size="11.5" font-weight="500" fill="#94A3B8" letter-spacing="3.5">AI-POWERED LISTINGS</text>
</svg>