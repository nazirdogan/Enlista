<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" width="520" height="100">
  <!-- Wordmark 1: Gradient Flow -->
  <!-- Each letter transitions through the blue gradient — smooth, modern, confident -->
  <defs>
    <linearGradient id="wm1grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0F1829;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#1D4ED8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <text x="20" y="68" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="64" font-weight="800" fill="url(#wm1grad)" letter-spacing="-2">enlista</text>
  <!-- Subtle dot accent on the 'i' -->
  <circle cx="303" cy="24" r="5" fill="#3B82F6"/>
</svg>