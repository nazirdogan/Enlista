<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" width="520" height="100">
  <!-- Wordmark 2: Split-Tone with Accent Bar -->
  <!-- "en" in dark, "lista" in primary blue, connected by a clean underline bar -->
  <text x="20" y="62" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="58" font-weight="800" fill="#0F1829" letter-spacing="1">en</text>
  <text x="118" y="62" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="58" font-weight="800" fill="#1D4ED8" letter-spacing="1">lista</text>
  <!-- Accent underline bar — starts thin, grows under "lista" -->
  <rect x="20" y="72" width="30" height="2.5" rx="1.25" fill="#0F1829" opacity="0.2"/>
  <rect x="118" y="72" width="190" height="3.5" rx="1.75" fill="#1D4ED8"/>
  <!-- Period accent at the end -->
  <circle cx="322" cy="58" r="5" fill="#3B82F6"/>
</svg>