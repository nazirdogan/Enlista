<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" width="520" height="100">
  <!-- Wordmark 4: Stencil Weight Contrast -->
  <!-- Bold 'E' and 'L' as anchors, lighter connecting letters — creates rhythm and visual hierarchy -->
  <defs>
    <linearGradient id="wm4dot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Heavy letters -->
  <text x="18" y="66" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="60" font-weight="900" fill="#0F1829" letter-spacing="2">e</text>
  <!-- Light connecting letters -->
  <text x="60" y="66" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="60" font-weight="300" fill="#0F1829" letter-spacing="2">n</text>
  <!-- Heavy -->
  <text x="108" y="66" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="60" font-weight="900" fill="#1D4ED8" letter-spacing="2">l</text>
  <!-- Light -->
  <text x="132" y="66" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="60" font-weight="300" fill="#0F1829" letter-spacing="2">i</text>
  <!-- Heavy -->
  <text x="156" y="66" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="60" font-weight="900" fill="#0F1829" letter-spacing="2">s</text>
  <!-- Light -->
  <text x="194" y="66" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="60" font-weight="300" fill="#0F1829" letter-spacing="2">t</text>
  <!-- Heavy -->
  <text x="222" y="66" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="60" font-weight="900" fill="#0F1829" letter-spacing="2">a</text>

  <!-- Accent dot over the 'i' in brand blue -->
  <circle cx="163" cy="22" r="5.5" fill="url(#wm4dot)"/>

  <!-- Thin underline from 'l' through 'a' -->
  <rect x="108" y="74" width="150" height="2" rx="1" fill="#1D4ED8" opacity="0.25"/>
</svg>