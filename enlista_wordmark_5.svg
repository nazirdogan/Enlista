<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" width="520" height="100">
  <!-- Wordmark 5: Ultra-Refined Thin + Cursor -->
  <!-- Hairline weight, generous spacing, with a blinking cursor after the 'a' — the AI is writing -->
  <defs>
    <linearGradient id="wm5grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1D4ED8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <style>
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .cursor { animation: blink 1.1s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Main wordmark — ultra thin -->
  <text x="20" y="58" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="54" font-weight="200" fill="#0F1829" letter-spacing="8">enlista</text>

  <!-- Blinking cursor — the AI is typing -->
  <rect class="cursor" x="390" y="22" width="3" height="40" rx="1.5" fill="url(#wm5grad)"/>

  <!-- Fine rule below -->
  <line x1="20" y1="70" x2="393" y2="70" stroke="#DDE3EC" stroke-width="0.8"/>

  <!-- Two-tone tagline: muted + blue -->
  <text x="20" y="88" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="500" fill="#64748B" letter-spacing="3">POWERED BY</text>
  <text x="112" y="88" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#1D4ED8" letter-spacing="3">ARTIFICIAL INTELLIGENCE</text>
</svg>