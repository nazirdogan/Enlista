<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <!-- Wordmark V2-3: Underline Accent — Clean wordmark with a thick blue underline beneath "a" -->
  <defs>
    <linearGradient id="ulGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
  </defs>

  <text x="20" y="58" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="52" font-weight="700" fill="#0F172A" letter-spacing="-2">enlista</text>

  <!-- Thick underline beneath the "a" -->
