<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <!-- Wordmark V2-4: Stencil Cut — All caps with horizontal cut-lines through each letter, industrial modern feel -->
  <defs>
    <clipPath id="stencilClip">
      <!-- Cut out horizontal lines to create stencil effect -->
      <rect x="0" y="0" width="420" height="30"/>
      <rect x="0" y="34" width="420" height="8"/>
      <rect x="0" y="46" width="420" height="54"/>
    </clipPath>
  </defs>

  <g clip-path="url(#stencilClip)">
    <text x="20" y="60" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="54" font-weight="800" fill="#0F172A" letter-spacing="6" text-transform="uppercase">ENLISTA</text>
  </g>

  <!-- Blue accent bar -->
  <rect x="20" y="70" width="50" height="4" rx="2" fill="#2563EB"/>

  <text x="22" y="88" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="#94A3B8" letter-spacing="5">AI-POWERED LISTINGS</text>
</svg>