<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <!-- Wordmark V2-5: Connected Ligature — Lowercase with a custom ligature connecting "st" and the "a" drawn as a custom loop -->
  <defs>
    <linearGradient id="ligGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="85%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main wordmark in a rounded, friendly weight -->
  <text x="18" y="58" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="52" font-weight="600" fill="url(#ligGrad)" letter-spacing="-2.5">enlista</text>

  <!-- Custom connecting swash from t to a -->
  <path d="M265 32 C272 28, 278 30, 278 36" fill="none" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>

  <!-- Sparkle dots -->
  <circle cx="288" cy="22" r="3" fill="#2563EB" opacity="0.5"/>
  <circle cx="296" cy="16" r="2" fill="#60A5FA" opacity="0.4"/>
  <circle cx="282" cy="16" r="1.5" fill="#93C5FD" opacity="0.3"/>

  <text x="20" y="82" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="500" fill="#94A3B8" letter-spacing="4">AI-POWERED LISTINGS</text>
</svg>